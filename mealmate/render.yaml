services:
  - type: web
    name: mealmate
    runtime: python3
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn mealmate.wsgi
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: mealmate
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: mealmate-db
          property: connectionString

databases:
  - name: mealmate-db
    databaseName: mealmate
    user: mealmate