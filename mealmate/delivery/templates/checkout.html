<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="checkout-page">
        <h1>Checkout</h1>
        <h2>Welcome, {{ username }}</h2>

        {% if error %}
        <p class="error-text">{{ error }}</p>
        {% else %}

        <div class="checkout-items-list">
            {% for item in cart_items %}
            <div class="checkout-item-card">
                <img src="{{ item.image.url }}" alt="{{ item.name }}" class="checkout-item-image">
                <div class="checkout-item-details">
                    <div class="checkout-item-name">{{ item.name }}</div>
                    <div class="checkout-item-price">₹{{ item.price }}</div>
                </div>
            </div>
            {% endfor %}
        </div>

        <h3 class="checkout-total">Total: ₹{{ total_price }}</h3>
        <button class="checkout-pay-button" id="rzp-button">Pay with Razorpay</button>
        {% endif %}
    </div>


    

    <script>
    var options = {
        "key": "{{ razorpay_key_id }}", // Enter the Key ID generated from the Dashboard
        "amount": "{{ amount_paise }}", // Amount is in currency subunits.
        "currency": "INR",
        "name": "MealMate",
        "description": "Order Transaction",
        "image": "https://example.com/your_logo",
        "order_id": "{{ order_id }}", //This is a sample Order ID. Pass the `id` obtained in the response of Step 1
        "handler": function (response){
            alert(response.razorpay_payment_id);
            alert(response.razorpay_order_id);
            alert(response.razorpay_signature)
        },
        "prefill": {
            "name": "{{ username }}",
            "email": "customer@example.com",
            "contact": "+919876543210"
        },
        "notes": {
            "address": "Razorpay Corporate Office"
        },
        "theme": {
            "color": "#3399cc"
        }
    };
    var rzp1 = new Razorpay(options);
    rzp1.on('payment.failed', function (response){
            alert(response.error.code);
            alert(response.error.description);
            alert(response.error.source);
            alert(response.error.step);
            alert(response.error.reason);
            alert(response.error.metadata.order_id);
            alert(response.error.metadata.payment_id);
    });
    document.getElementById('rzp-button').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
    </script>
    
    {% include 'footer.html' %}
</body>
</html>
