<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="checkout-page">
        <div class="checkout-header">
            <h1>Checkout</h1>
            <h2>Welcome, {{ username }}</h2>
        </div>

        {% if error %}
        <p class="error-text">{{ error }}</p>
        {% else %}

        <div class="checkout-items-list">
            <table class="checkout-items-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td class="checkout-item-col">
                            <div class="checkout-item-details">
                                <div class="checkout-item-name">{{ item.name }}</div>
                            </div>
                        </td>
                        <td class="checkout-item-price">₹{{ item.price }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <h3 class="checkout-total">Total: ₹{{ total_price }}</h3>
        <button class="checkout-pay-button btn" id="rzp-button">Pay with Razorpay</button>
        {% endif %}
    </div>

    {% if order_id %}
    <form id="payment-form" method="post" action="{% url 'payment_handler' username=username %}" style="display:none;">
        {% csrf_token %}
        <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id" />
        <input type="hidden" name="razorpay_order_id" id="razorpay_order_id" />
        <input type="hidden" name="razorpay_signature" id="razorpay_signature" />
    </form>

    <script>
    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ amount_paise }}",
        "currency": "INR",
        "name": "MealMate",
        "description": "Order Transaction",
        "image": "https://example.com/your_logo",
        "order_id": "{{ order_id }}",
        "handler": function (response) {
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
            document.getElementById('razorpay_signature').value = response.razorpay_signature;
            document.getElementById('payment-form').submit();
        },
        "prefill": {
            "name": "{{ username }}",
            "email": "customer@example.com",
            "contact": "+919876543210"
        },
        "notes": {
            "address": "Razorpay Corporate Office"
        },
        "theme": {
            "color": "#3399cc"
        }
    };
    var rzp1 = new Razorpay(options);
    rzp1.on('payment.failed', function (response) {
        alert(response.error.code);
        alert(response.error.description);
        alert(response.error.source);
        alert(response.error.step);
        alert(response.error.reason);
        alert(response.error.metadata.order_id);
        alert(response.error.metadata.payment_id);
    });
    document.getElementById('rzp-button').onclick = function(e) {
        rzp1.open();
        e.preventDefault();
    }
    </script>
    {% endif %}

    {% include 'footer.html' %}
</body>
</html>
