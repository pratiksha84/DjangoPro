<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>
<body>
    <h3 style="text-align:center; margin-bottom:25px;">
        Welcome {{username}}!
    </h3>

    <div class="menu-list">
        {% for item in itemList %}
            <article class="menu-card">
                <img class="menu-card-image" src="{{ item.picture }}" alt="{{ item.name }}">
                <div class="menu-card-body">
                    <div class="menu-card-header">
                        <h2>{{ item.name }}</h2>
                        <span class="menu-card-price">₹{{ item.price }}</span>
                    </div>
                    <p class="menu-card-description">{{ item.description }}</p>
                    <div class="menu-card-meta">
                        {% if item.vegeterian %}
                            <span class="food-badge veg" title="Vegetarian" aria-label="Vegetarian">Veg</span>
                        {% else %}
                            <span class="food-badge nonveg" title="Non-vegetarian" aria-label="Non-vegetarian">Non-Veg</span>
                        {% endif %}
                    </div>
                    <a class="btn" href="{% url 'add_to_cart' restaurant.id item.id username %}">Add to cart</a>
                </div>
            </article>
        {% endfor %}
    </div>

    <div class="cart-action">
        <a class="btn cart-btn" href="{% url 'show_cart' username %}">Go to cart</a>
    </div>
    {% include 'footer.html' %}
</body>
</html>
