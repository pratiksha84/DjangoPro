<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>
<body>
    <h3 style="text-align:center; margin-bottom:25px;">
        Welcome {{username}}!
    </h3>

    <a href="{% url 'show_cart' username %}" class="floating-cart-btn" title="Go to cart">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
    </a>

    <div class="menu-list">
        {% for item in itemList %}
            <article class="menu-card">
                <img class="menu-card-image" src="{{ item.picture }}" alt="{{ item.name }}">
                <div class="menu-card-body">
                    <div class="menu-card-header">
                        <h2>{{ item.name }}</h2>
                        <span class="menu-card-price">₹{{ item.price }}</span>
                    </div>
                    <p class="menu-card-description">{{ item.description }}</p>
                    <div class="menu-card-meta">
                        {% if item.vegeterian %}
                            <span class="food-badge veg" title="Vegetarian" aria-label="Vegetarian"></span>
                        {% else %}
                            <span class="food-badge nonveg" title="Non-vegetarian" aria-label="Non-vegetarian"></span>
                        {% endif %}
                    </div>
                    <a class="btn" href="{% url 'add_to_cart' restaurant.id item.id username %}">Add to cart</a>
                </div>
            </article>
        {% endfor %}
    </div>
    {% include 'footer.html' %}
</body>
</html>
