<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>
<body>
    <h3 style="text-align:center; margin-bottom:25px;">
        Welcome {{username}}!
    </h3>

    <a class="btn" href="{% url 'show_cart' username %}">Go to cart</a>

    <!-- show current menu -->
    <table border="1">
        <thead>
            <tr>
                <th>Item name</th>
                <th>Picture</th>
                <th>Description</th>
                <th>Price</th>
                <th>Is veg?</th>
                <th>Operation</th>
            </tr>
        </thead>
        <tbody>
            {%  for item in itemList %}
                <tr>
                    <td>{{ item.name }}</td>
                    <td>
                        <img src="{{ item.picture }}" width="120" alt="{{ item.name }}">
                    </td>
                    <td>{{ item.description }}</td>
                    <td>{{ item.price }}</td>
                    <td>
                        {% if item.vegeterian %}
                            <span class="food-badge veg" title="Vegetarian" aria-label="Vegetarian"></span>
                        {% else %}
                            <span class="food-badge nonveg" title="Non-vegetarian" aria-label="Non-vegetarian"></span>
                        {% endif %}
                    </td>
                    <td>
                        <a class="btn" href="{% url 'add_to_cart' restaurant.id item.id username %}">Add to cart</a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
    {% include 'footer.html' %}
</body>
</html>
