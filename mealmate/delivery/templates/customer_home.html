<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Page</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>
<body>
    <h3 style="text-align:center; margin-bottom:25px;">
        Welcome {{username}}!
    </h3>

    <a href="{% url 'show_cart' username %}" class="floating-cart-btn" title="Go to cart">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
    </a>

    <div class="restaurant-list">
        {% for r in restaurantList %}
            <article class="restaurant-card">
                <img class="restaurant-card-image" src="{{ r.picture }}" alt="{{ r.name }}">
                <div class="restaurant-card-body">
                    <h2>{{ r.name }}</h2>
                    <p class="restaurant-card-cuisine">{{ r.cuisine }}</p>
                    <p class="restaurant-card-rating">Rating: {{ r.rating }}</p>
                    {% if username %}
                        <a class="btn" href="{% url 'view_menu' r.id username %}">View Menu</a>
                    {% else %}
                        <a class="btn" href="{% url 'open_signin' %}">View Menu</a>
                    {% endif %}
                </div>
            </article>
        {% endfor %}
    </div>
    {% include 'footer.html' %}
</body>
</html>
