<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Order Summary</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>
<body>
    <main class="orders-page">
        <div class="orders-container">
            <h1 class="orders-title">Thank you for your order, {{ username }}!</h1>

            <section class="orders-details">
                <h2>Delivery Address</h2>
                <p>{{ customer.address }}</p>

                <p>Your order will be delivered to this location shortly. Thank you for choosing MealMate!</p>

                <div class="orders-actions">
                    <a class="btn" href="{% url 'customer_restaurants' username %}">Back to Home</a>
                </div>
            </section>
        </div>
    </main>

    {% include 'footer.html' %}
</body>
</html>
